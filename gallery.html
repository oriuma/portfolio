<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before/After Gallery | Oriuma</title>
    <meta name="description" content="Photo editing portfolio - before and after examples">
    <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/564x/68/cd/36/68cd367a3757c1d07de808bcf7bc9bf0.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gallery-style.css">
</head>
<body>
    <!-- WebGL Background -->
    <canvas id="webgl-background"></canvas>

    <div class="container">
        <header class="header">
            <h1 class="title">AI Gallery made by Oriuma</h1>
            <p class="subtitle">Drag the slider to see the transformation</p>
        </header>

        <div class="gallery">
            <!-- Row 1 Left - Active comparison -->
            <div class="comparison-card">
                <div class="comparison-wrapper">
                    <div class="comparison-container">
                        <img src="original_1.avif" alt="Original Photo" class="image-before">
                        <div class="image-after-wrapper" style="width: 50%;">
                            <img src="fixed_1.png" alt="Edited Photo" class="image-after">
                        </div>
                        <div class="slider" style="left: 50%;">
                            <div class="slider-button">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <path d="M15 18l-6-6 6-6"/>
                                    <path d="M9 18l6-6-6-6"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="labels">
                        <span class="label label-before">Before</span>
                        <span class="label label-after">After</span>
                    </div>
                </div>
            </div>

            <!-- Row 1 Right - Placeholder -->
            <div class="comparison-card placeholder">
                <div class="placeholder-content">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <p>Coming Soon</p>
                </div>
            </div>

            <!-- Row 2 Left - Placeholder -->
            <div class="comparison-card placeholder">
                <div class="placeholder-content">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <p>Coming Soon</p>
                </div>
            </div>

            <!-- Row 2 Right - Placeholder -->
            <div class="comparison-card placeholder">
                <div class="placeholder-content">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <p>Coming Soon</p>
                </div>
            </div>

            <!-- Row 3 Left - Placeholder -->
            <div class="comparison-card placeholder">
                <div class="placeholder-content">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <p>Coming Soon</p>
                </div>
            </div>

            <!-- Row 3 Right - Placeholder -->
            <div class="comparison-card placeholder">
                <div class="placeholder-content">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <p>Coming Soon</p>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Portfolio
            </a>
        </div>
    </div>

    <script src="gallery-webgl.js"></script>
    <script src="gallery-script.js"></script>
</body>
</html>
