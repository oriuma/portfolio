<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before/After Gallery | Oriuma</title>
    <meta name="description" content="Photo editing portfolio - before and after examples">
    <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/564x/68/cd/36/68cd367a3757c1d07de808bcf7bc9bf0.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gallery-style.css">
</head>
<body>
    <div class="background-aurora">
        <div class="aurora-shape shape1"></div>
        <div class="aurora-shape shape2"></div>
        <div class="aurora-shape shape3"></div>
    </div>

    <div class="container">
        <header class="header">
            <h1 class="title">📸 My Photo Editing Work</h1>
            <p class="subtitle">Drag the slider to see the transformation</p>
        </header>

        <div class="gallery">
            <!-- Before/After Comparison 1 -->
            <div class="comparison-card">
                <div class="comparison-wrapper">
                    <div class="comparison-container">
                        <img src="original_1.avif" alt="Original Photo" class="image-before">
                        <div class="image-after-wrapper" style="width: 50%;">
                            <img src="fixed_1.png" alt="Edited Photo" class="image-after">
                        </div>
                        <div class="slider" style="left: 50%;">
                            <div class="slider-button">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <path d="M15 18l-6-6 6-6"/>
                                    <path d="M9 18l6-6-6-6"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="labels">
                        <span class="label label-before">Before</span>
                        <span class="label label-after">After</span>
                    </div>
                </div>
            </div>

            <!-- Add more comparison cards here when you add more images -->

                                </svg>
                            </div>
                        </div>

                    <div class="labels">

                    </div>
                </div>
            </div>
            -->
        </div>

        <div class="footer">
            <a href="index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Portfolio
            </a>
        </div>
    </div>

    <script src="gallery-script.js"></script>
</body>
</html>
