<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n8n Workflows | Oriuma</title>
    <meta name="description" content="Discover my automation workflows built with n8n">
    <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/564x/68/cd/36/68cd367a3757c1d07de808bcf7bc9bf0.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="n8n-style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">n8n Workflows</h1>
            <p class="subtitle">Automation workflows for business and beyond</p>
            <div class="stats">
                <span class="stat-item">
                    <span class="stat-number" id="workflow-count">12</span>
                    <span class="stat-label">workflows</span>
                </span>
            </div>
        </header>

        <div class="filters">
            <div class="search-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search workflows..." autocomplete="off">
            </div>

            <div class="filter-group">
                <label>Category:</label>
                <select id="category-filter">
                    <option value="all">All Categories</option>
                    <option value="ai">AI & LLM</option>
                    <option value="social">Social Media</option>
                    <option value="productivity">Productivity</option>
                    <option value="data">Data Processing</option>
                    <option value="automation">Business Automation</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Complexity:</label>
                <select id="complexity-filter">
                    <option value="all">All Levels</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>
        </div>

        <div class="workflows-grid" id="workflows-grid">
            <!-- Workflows will be generated here by JS -->
        </div>

        <div class="empty-state" id="empty-state" style="display: none;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
            </svg>
            <h3>No workflows found</h3>
            <p>Try adjusting your filters or search term</p>
        </div>

        <div class="footer">
            <a href="index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Portfolio
            </a>
        </div>
    </div>

    <script src="n8n-data.js"></script>
    <script src="n8n-script.js"></script>
</body>
</html>
