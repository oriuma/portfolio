<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Generator | Oriuma</title>
    <meta name="description" content="Create unique avatars instantly with DiceBear API">
    <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/564x/68/cd/36/68cd367a3757c1d07de808bcf7bc9bf0.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="avatar-style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">Avatar Generator</h1>
            <p class="subtitle">Create unique avatars powered by DiceBear</p>
        </header>

        <div class="generator-section">
            <div class="input-group">
                <label for="seed-input">Enter your name or any text:</label>
                <input 
                    type="text" 
                    id="seed-input" 
                    placeholder="e.g., John, Coffee, 123..." 
                    autocomplete="off"
                >
            </div>

            <div class="style-selector">
                <label>Choose style:</label>
                <div class="style-grid">
                    <button class="style-btn active" data-style="avataaars">Avataaars</button>
                    <button class="style-btn" data-style="bottts">Bottts</button>
                    <button class="style-btn" data-style="fun-emoji">Emoji</button>
                    <button class="style-btn" data-style="lorelei">Lorelei</button>
                    <button class="style-btn" data-style="micah">Micah</button>
                    <button class="style-btn" data-style="pixel-art">Pixel Art</button>
                </div>
            </div>

            <button id="generate-btn" class="generate-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12a9 9 0 11-6.219-8.56"/>
                </svg>
                Generate Avatar
            </button>
        </div>

        <div class="preview-section" id="preview-section">
            <div class="avatar-preview">
                <img id="avatar-img" src="" alt="Generated Avatar">
            </div>
            
            <div class="action-buttons">
                <button id="download-svg" class="action-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    Download SVG
                </button>
                <button id="download-png" class="action-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    Download PNG
                </button>
                <button id="randomize-btn" class="action-btn secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 2v6h-6M3 12a9 9 0 0115-6.7L21 8M3 22v-6h6M21 12a9 9 0 01-15 6.7L3 16"/>
                    </svg>
                    Random
                </button>
            </div>
        </div>

        <div class="footer">
            <a href="index.html" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Portfolio
            </a>
        </div>
    </div>

    <script src="avatar-script.js"></script>
</body>
</html>
